# Jobs plugin English locale.

command:
  loading: "<gray>Plugin is loading.</gray>"
  player_only: "<red>This command can only be run by a player.</red>"
  status:
    no_specialty: "<yellow>No specialty selected yet. Run /jobs select.</yellow>"
    current: "<gray>Current specialty:</gray> <white><current_job></white>"
  select:
    already_selected: "<yellow>You have already selected a specialty. Use /jobs change.</yellow>"
    opened: "<gray>Opened specialty selection dialog.</gray>"
  change:
    opened: "<gray>Opened specialty change dialog.</gray>"
    no_selection: "<yellow>No specialty selected yet. Use /jobs select.</yellow>"

dialog:
  select:
    title: "Select your specialty"
    body: "Choose your specialty. Only specialty actions earn rewards."
    button: "<display_name>"
  change:
    title: "Change specialty"
    body: "Current: <current_job>. Choose your new specialty."
    button: "<display_name>"
    dismiss: "Close"
    cooldown:
      title: "Cannot change now"
      body: "Current: <current_job>. Next available: <next_available> (<remaining> left)."

notify:
  selected: "<green>Specialty set to <job>.</green>"
  changed: "<green>Specialty changed from <previous> to <next>.</green>"
  unknown_job: "<red>Unknown job: <job>.</red>"
  cooldown: "<yellow>Specialty change is on cooldown (<remaining> left).</yellow>"
