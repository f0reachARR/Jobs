# Jobs plugin English locale.

command:
  loading: "<gray>Plugin is loading.</gray>"
  player_only: "<red>This command can only be run by a player.</red>"
  status:
    no_specialty: "<yellow>No specialty selected yet. Run /jobs select.</yellow>"
    current: "<gray>Current specialty:</gray> <white><current_job></white>"
    daily_total: "<gray>Today:</gray> <white><total></white><gray> / <cap></gray>"
    daily_bar: "<gray>[<bar>] <percent>%</gray>"
    daily_cap_hit: "<yellow>Daily cap reached. No further rewards until reset.</yellow>"
    next_change: "<gray>Next change available at:</gray> <white><next_at></white>"
    variety:
      active: "<gray>Variety penalty:</gray> <yellow>active</yellow> <gray>(<size>/<capacity> logs, top <ratio>%)</gray>"
      disclosed: "<yellow><disclosed></yellow>"
      none: "<gray>Variety penalty:</gray> <green>not active</green>"
  reload:
    ok: "<green>Jobs reloaded. <gray>(<jobs> jobs / <rewards> rewards)</gray></green>"
    failed: "<red>Reload failed: <error></red>"
  select:
    already_selected: "<yellow>You are already on that specialty.</yellow>"
  info:
    unknown_job: "<red>Unknown job: <job>.</red>"
  admin:
    unknown_player: "<red>Unknown player: <name>.</red>"
    inspect:
      header: "<gold>== Status of <name> ==</gold>"
      no_specialty: "<yellow>No specialty selected.</yellow>"
      current: "<gray>Current specialty:</gray> <white><job></white>"
      cooldown_base: "<gray>Cooldown base:</gray> <white><base_at></white>"
      next_change: "<gray>Next change available at:</gray> <white><next_at></white>"
      daily_total: "<gray>Today's total:</gray> <white><total></white>"
      variety_offline: "<gray>Variety ring buffer:</gray> <yellow>unavailable (player offline)</yellow>"
      variety_snapshot: "<gray>Variety ring buffer:</gray> <white><size>/<capacity>, top <ratio>%</white>"
    actions:
      header: "<gold>== Last <limit> actions of <name> (last <since_hours>h) ==</gold>"
      empty: "<gray>No action log entries found.</gray>"
      row: "<gray><time></gray> <white><job></white>/<action_key> = <white><reward></white><rare>"
      error: "<red>Failed to fetch action log: <error></red>"
    stats:
      header: "<gold>== Jobs stats ==</gold>"
      job_header: "<gray>== Job <job> ==</gray>"
      job_row: "<gray>- </gray><white><job></white><gray>:</gray> <white><count></white><gray> player(s)</gray>"
      daily_total: "<gray>Total paid today:</gray> <white><total></white>"
      actions_today: "<gray>Actions today:</gray> <white><count></white>"
      rare_hits: "<gray>Rare hit rate:</gray> <white><percent>%</white> <gray>(<rare>/<total>)</gray>"
      error: "<red>Failed to aggregate: <error></red>"
      unknown_job: "<red>Unknown job: <job>.</red>"
    set:
      unknown_job: "<red>Unknown job: <job>.</red>"
      ok_initial: "<green>Assigned specialty <job> to <name>.</green>"
      ok_changed: "<green>Changed <name>'s specialty from <previous> to <job>.</green>"
      no_change: "<yellow><name> is already on <job>.</yellow>"
    reset_cooldown:
      ok: "<green>Cleared change cooldown for <name>.</green>"
      no_specialty: "<yellow><name> has not selected a specialty yet.</yellow>"
    pay:
      ok: "<green>Paid <amount> to <name>.<reason></green>"
      failed: "<red>Payment to <name> was rejected by Vault.</red>"
      invalid_amount: "<red>Amount must be positive.</red>"
    reset_daily_cap:
      ok: "<green>Reset today's total for <name>.</green>"
    reset_variety:
      ok: "<green>Cleared variety ring buffer for <name>.</green>"
      offline: "<yellow><name> is offline (variety is memory-only).</yellow>"
    flush:
      ok: "<green>Flushed action_log (<count> rows).</green>"
      error: "<red>Flush failed: <error></red>"

dialog:
  select:
    title: "Select your specialty"
    body: "Choose your specialty. Only specialty actions earn rewards."
    button: "<display_name>"
  change:
    title: "Change specialty"
    body: "Current: <current_job>. Choose your new specialty."
    button: "<display_name>"
    dismiss: "Close"
    cooldown:
      title: "Cannot change now"
      body: "Current: <current_job>. Next available: <next_available> (<remaining> left)."
  info:
    title: "<display_name> conditions"
    description: "<gray><description></gray>"
    header:
      rewards: "<gold>Reward actions</gold>"
      variety: "<gold>Variety penalty</gold>"
      anti_automation: "<gold>Anti-automation</gold>"
    reward:
      template: "<gray>- </gray><label><gray>:</gray> <target><amount><rare>"
      label:
        entity_killed: "Kill"
        block_broken: "Break"
        block_placed: "Place"
        item_fished: "Fish"
        item_smelted: "Smelt"
        item_crafted: "Craft"
        item_enchanted: "Enchant"
        item_repaired: "Repair"
        entity_bred: "Breed"
        entity_tamed: "Tame"
        entity_sheared: "Shear"
        item_consumed: "Consume"
        villager_traded: "Trade"
        item_brewed: "Brew"
        advancement: "Advancement"
      amount:
        fixed: " <gray>-></gray> <white><value></white>"
        range: " <gray>-></gray> <white><min>-<max></white>"
      rare_hint: " <yellow>(rare bonus)</yellow>"
      truncated: "<gray>...and <count> more</gray>"
    target:
      list_separator: " / "
      tag_suffix: " (tag)"
      crop_mature: " (mature only)"
      via_tnt: " (via TNT)"
      fish_treasure: " (treasure)"
      fish_treasure_only: "treasure"
      enchant_with_level: " (<enchant> Lv<level_min>+)"
      enchant_only: " (<enchant>)"
      level_only: " (Lv<level_min>+)"
      repair_anvil: " (anvil)"
      repair_mending: " (mending)"
      consume_food: " (food)"
      consume_drink: " (drink)"
    variety:
      none: "None"
      disclosed: "<yellow><disclosed></yellow>"
      active_no_message: "Enabled"
    anti_automation:
      none: "None"
      spawner_origin_kill: "Spawner-originated kills pay 0"
      unplanted_crop_harvest: "Unplanted crop harvests pay 0"
      recently_placed_break: "Recently placed blocks pay 0 (within <window_sec>s)"
      auto_fed_processing: "Hopper/dispenser auto-fed items pay 0"
      villager_repeat_trade: "Same villager x recipe within cooldown pays 0 (<cooldown_sec>s)"
      breed_non_player_breeder: "Non-player breeding pays 0"
    list:
      title: "Jobs"
      body: "Pick a job to see its conditions."
      button: "<display_name>"
    button:
      select: "Select this job"
      change: "Change to this job"
      back: "Back to list"
      close: "Close"

notify:
  selected: "<green>Specialty set to <job>.</green>"
  changed: "<green>Specialty changed from <previous> to <next>.</green>"
  unknown_job: "<red>Unknown job: <job>.</red>"
  cooldown: "<yellow>Specialty change is on cooldown (<remaining> left).</yellow>"
  anti_automation:
    spawner_origin_kill: "<red>Spawner-originated kills are not rewarded.</red>"
    unplanted_crop_harvest: "<red>Harvesting crops you did not plant is not rewarded.</red>"
    recently_placed_break: "<red>Breaking blocks you recently placed is not rewarded.</red>"
    auto_fed_processing: "<red>Items produced via hopper/dispenser auto-feed are not rewarded.</red>"
    villager_repeat_trade: "<red>Same villager x same trade is on cooldown.</red>"
    breed_non_player_breeder: "<red>Breeding without a player breeder is not rewarded.</red>"
