# Job プラグイン 日本語ロケール
# 値は MiniMessage 形式で記述する。装飾を外しても意味が通るように書くこと。
# （Bedrock Edition では装飾が落ちる）

command:
  loading: "<gray>プラグインを読み込み中です…</gray>"
  player_only: "<red>このコマンドはプレイヤーからのみ実行できます。</red>"
  status:
    no_specialty: "<yellow>まだ専業が選択されていません。/jobs select を実行してください。</yellow>"
    current: "<gray>現在の専業:</gray> <white><current_job></white>"
    daily_total: "<gray>本日の獲得額:</gray> <white><total></white><gray> / <cap></gray>"
    daily_bar: "<gray>[<bar>] <percent>%</gray>"
    daily_cap_hit: "<yellow>本日の獲得上限に達しました。次回リセットまで報酬は 0 になります。</yellow>"
    next_change: "<gray>次回変更可能:</gray> <white><next_at></white>"
    variety:
      active: "<gray>単調性ペナルティ:</gray> <yellow>作動中</yellow> <gray>(<size>/<capacity> 件, 最多 <ratio>%)</gray>"
      disclosed: "<yellow><disclosed></yellow>"
      none: "<gray>単調性ペナルティ:</gray> <green>作動していません</green>"
  reload:
    no_permission: "<red>このコマンドを実行する権限がありません (jobs.admin)。</red>"
    ok: "<green>Jobs を再読込しました。 <gray>(<jobs> ジョブ / <rewards> 報酬)</gray></green>"
    failed: "<red>再読込に失敗しました: <error></red>"
  select:
    already_selected: "<yellow>すでにその専業を選択済みです。</yellow>"
  info:
    unknown_job: "<red>ジョブ '<job>' は存在しません。</red>"

dialog:
  select:
    title: "専業を選ぶ"
    body: "あなたの専業を選択してください。専業のアクションだけが報酬対象になります。"
    button: "<display_name>"
  change:
    title: "専業を変更する"
    body: "現在の専業: <current_job>。変更先を選んでください。"
    button: "<display_name>"
    dismiss: "閉じる"
    cooldown:
      title: "専業変更は不可"
      body: "現在の専業: <current_job>。次回変更可能: <next_available>（あと <remaining>）。"
  info:
    title: "<display_name> の条件"
    description: "<gray><description></gray>"
    header:
      rewards: "<gold>報酬対象アクション</gold>"
      variety: "<gold>単調性ペナルティ</gold>"
      anti_automation: "<gold>自動化対策</gold>"
    reward:
      template: "<gray>- </gray><label><gray>:</gray> <target><amount><rare>"
      label:
        entity_killed: "討伐"
        block_broken: "採掘・伐採"
        block_placed: "設置"
        item_fished: "釣り"
        item_smelted: "精錬"
        item_crafted: "クラフト"
        item_enchanted: "付呪"
        item_repaired: "修理"
        entity_bred: "繁殖"
        entity_tamed: "手懐け"
        entity_sheared: "毛刈り"
        item_consumed: "消費"
        villager_traded: "取引"
        item_brewed: "醸造"
        advancement: "達成"
      amount:
        fixed: " <gray>→</gray> <white><value></white>"
        range: " <gray>→</gray> <white><min>〜<max></white>"
      rare_hint: " <yellow>(レア報酬あり)</yellow>"
      truncated: "<gray>…ほか <count> 件</gray>"
    target:
      list_separator: " / "
      tag_suffix: " (タグ)"
      crop_mature: " (完熟のみ)"
      via_tnt: " (TNT 由来)"
      fish_treasure: " (宝箱ループ)"
      fish_treasure_only: "宝箱ループ"
      enchant_with_level: " (<enchant> Lv<level_min>+)"
      enchant_only: " (<enchant>)"
      level_only: " (Lv<level_min>+)"
      repair_anvil: " (金床)"
      repair_mending: " (mending)"
      consume_food: " (food)"
      consume_drink: " (drink)"
    variety:
      none: "なし"
      disclosed: "<yellow><disclosed></yellow>"
      active_no_message: "有効"
    anti_automation:
      none: "なし"
      spawner_origin_kill: "スポナー由来の敵の討伐は報酬 0"
      unplanted_crop_harvest: "自分で植えていない作物の収穫は報酬 0"
      recently_placed_break: "直近に設置した block の破壊は報酬 0 (<window_sec> 秒以内)"
      auto_fed_processing: "hopper / dispenser 経由の自動投入は報酬 0"
      villager_repeat_trade: "同 villager × 同 recipe の連続取引は cooldown 中 0 (<cooldown_sec> 秒)"
      breed_non_player_breeder: "プレイヤー以外による交配は報酬 0"
    list:
      title: "職業一覧"
      body: "詳細を見たい職業を選んでください。"
      button: "<display_name>"
    button:
      select: "この職業を選ぶ"
      change: "この職業に変更する"
      back: "一覧に戻る"
      close: "閉じる"

notify:
  selected: "<green>専業を <job> に決定しました。</green>"
  changed: "<green>専業を <previous> から <next> に変更しました。</green>"
  unknown_job: "<red>ジョブ '<job>' は存在しません。</red>"
  cooldown: "<yellow>専業変更のクールダウン中です（あと <remaining>）。</yellow>"
  anti_automation:
    spawner_origin_kill: "<red>スポナー由来の敵の討伐は報酬対象外です。</red>"
    unplanted_crop_harvest: "<red>自分で植えていない作物の収穫は報酬対象外です。</red>"
    recently_placed_break: "<red>直近に設置した block の破壊は報酬対象外です。</red>"
    auto_fed_processing: "<red>hopper / dispenser 経由の自動投入は報酬対象外です。</red>"
    villager_repeat_trade: "<red>同じ villager × 同じ取引の連続は cooldown 中です。</red>"
    breed_non_player_breeder: "<red>プレイヤー以外による交配は報酬対象外です。</red>"
