# Job プラグイン グローバル設定
# 詳細は docs/spec/02-yaml-schema.md 「グローバル設定 (config.yml)」を参照。

specialty_mode:
  # 専業外アクションの倍率。0.0 のとき報酬支払いも行動ログ書き込みも行わない。
  reward_non_specialty: 0.0
  # 未選択プレイヤーのログイン直後に選択ダイアログを自動表示するか。
  # false のときはプレイヤーが自発的に /jobs select を実行するまで表示しない。
  show_select_dialog_on_join: true
  # 専業変更のクールダウン。上から評価し within にマッチした最初のポリシーが適用される。
  change_policy:
    - within:
        event_hours: [0, 24]
      cooldown: 1h
    - default:
      cooldown: 5d

reward:
  # 小数点以下の桁数 (0..6)。0 のとき整数のみに丸める。
  decimals: 0
  # 丸め方式。java.math.RoundingMode の名称をそのまま指定する。
  # HALF_UP / HALF_EVEN / HALF_DOWN / UP / DOWN / CEILING / FLOOR / UNNECESSARY のいずれか。
  rounding_mode: HALF_UP

daily_cap:
  # 1 日あたりの報酬上限。scope は total (全ジョブ合算) または per_job。
  amount: 1000000
  reset_at: "00:00"
  scope: total

persistence:
  type: mysql
  host: localhost
  port: 3306
  database: jobs
  user: jobs
  password: ""
  pool_size: 8
  retention_days: 30

kvs:
  # memory または redis。redis は Phase 2 の予約。
  type: memory

anti_automation:
  # 各 check の「グローバルデフォルト」。per-job YAML の anti_automation で
  # 同じキーを明示すれば per-job 値が勝つ。省略なら下の default が全ジョブに効く。
  #
  # 有効化:   `zero` を書く / section を書く
  # 無効化:   `off` を書く / section で `enabled: false`
  # 未指定:  行を消す（そのキーだけデフォルトなしになり、per-job で opt-in された場合のみ動く）
  #
  # 従来 (Phase 7 まで) と同じ挙動にしたければ、このセクションを空にして per-job YAML のみで有効化する。

  # spawner_origin_kills: zero
  # unplanted_crop_harvest: zero
  # recently_placed_break:
  #   window_sec: 3600
  # auto_fed_processing:
  #   operator_ttl_sec: 60
  # villager_repeat_trade:
  #   cooldown_sec: 60
  #   scope: recipe
  # breed_non_player_breeder: zero

  notify:
    # 0 判定が発火したときに、プレイヤーへ ActionBar で理由を表示する。
    # 各 reason ごとに個別に切れる (reason 名は AntiAutomationCheck の REASON 定数と対応)。
    # per-job override は無い (グローバル固定)。
    action_bar:
      spawner_origin_kill: true
      unplanted_crop_harvest: true
      recently_placed_break: true
      auto_fed_processing: true
      villager_repeat_trade: true
      breed_non_player_breeder: true
