# 探検職。item_fished の treasure、item_consumed の category、villager_traded を試すサンプル。
# first match wins のため、treasure エントリを specific エントリより上に置くと影響することを確認できる。

id: explorer
display_name: "探検"
description: "釣り・取引・食料や飲料の消費で稼ぐ。動き回って世界と接する暮らしに向く。"
icon: minecraft:filled_map

rewards:
  # 宝箱アイテム全般に高額報酬 (fishing/treasure loot table 相当)
  - on: item_fished
    treasure: true
    reward: 100

  # 通常魚
  - on: item_fished
    item: [minecraft:cod, minecraft:salmon, minecraft:pufferfish, minecraft:tropical_fish]
    reward: 3

  # 食事 (category: food のみに絞る例。ポーションなどは match 外)
  - on: item_consumed
    item: minecraft:golden_apple
    category: food
    reward: 20
  - on: item_consumed
    item: minecraft:enchanted_golden_apple
    category: food
    reward: 200

  # 飲料 (category: drink)
  - on: item_consumed
    item: minecraft:potion
    category: drink
    reward: 5
  - on: item_consumed
    item: minecraft:milk_bucket
    category: drink
    reward: 2

  # Villager 取引 (取引個数 × reward)
  - on: villager_traded
    item: minecraft:emerald
    reward: 3
  - on: villager_traded
    item: [minecraft:enchanted_book, minecraft:diamond, minecraft:name_tag]
    reward: 15

anti_automation:
  villager_repeat_trade:
    cooldown_sec: 60
