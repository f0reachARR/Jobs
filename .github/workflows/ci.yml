name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Build & Test (SQLite + MySQL)
    runs-on: ubuntu-latest

    services:
      # GitHub Actions starts MySQL as a side-car container. We expose 3306
      # on the host so the Gradle process can reach it on 127.0.0.1.
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: rootpw
          MYSQL_DATABASE: jobs
          MYSQL_USER: jobs
          MYSQL_PASSWORD: jobs
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h 127.0.0.1 -uroot -prootpw"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 20

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Wait for MySQL
        run: |
          for i in $(seq 1 60); do
            if mysqladmin ping -h 127.0.0.1 -uroot -prootpw --silent; then
              echo "MySQL is up"
              exit 0
            fi
            sleep 2
          done
          echo "MySQL never came up" >&2
          exit 1

      - name: Grant privileges on jobs schema
        # MySqlPersistenceIntegrationTest は毎テストラン開始時に DROP TABLE を
        # 走らせるので、`jobs` DB 上の全権限を付与しておく。
        run: |
          mysql -h 127.0.0.1 -uroot -prootpw -e "
            GRANT ALL PRIVILEGES ON \`jobs\`.* TO 'jobs'@'%';
            FLUSH PRIVILEGES;"

      - name: Build & test
        env:
          # MySqlPersistenceIntegrationTest はこれらの環境変数が揃った時のみ
          # @EnabledIfEnvironmentVariable で有効化される。
          JOBS_TEST_MYSQL_HOST: 127.0.0.1
          JOBS_TEST_MYSQL_PORT: '3306'
          JOBS_TEST_MYSQL_DATABASE: jobs
          JOBS_TEST_MYSQL_USER: jobs
          JOBS_TEST_MYSQL_PASSWORD: jobs
        run: ./gradlew build --no-daemon --stacktrace

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            build/reports/tests/test
            build/test-results/test
          if-no-files-found: ignore
